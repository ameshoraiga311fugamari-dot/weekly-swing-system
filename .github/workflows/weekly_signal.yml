name: Weekly Swing Signal

on:
schedule:
- cron: '0 22 * * 0'
workflow_dispatch:

jobs:
run-signal:

runs-on: ubuntu-latest

steps:

- uses: actions/checkout@v4

- name: Setup Python
  uses: actions/setup-python@v5
  with:
    python-version: "3.12"

- name: Install packages
  run: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt

- name: Run signal
  run: |
    python weekly_signal.py
