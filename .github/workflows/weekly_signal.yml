name: Weekly Swing Signal

on:
  schedule:
    - cron: '0 22 * * 0'
  workflow_dispatch:

jobs:
  run-signal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install packages
        run: |
          pip install -r requirements.txt

      - name: Run signal
        run: |
          python weekly_signal.py

      - name: Commit signal history
        run: |
          git config --global user.name github-actions
          git config --global user.email github-actions@github.com

          git add signal_history.csv

          git commit -m "update signal history" || echo "No changes"

          git push
